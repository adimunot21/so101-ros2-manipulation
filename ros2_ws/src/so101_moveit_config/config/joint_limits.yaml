# Joint velocity/acceleration limits for MoveIt2 trajectory planning.
# MoveIt2 looks for these under "robot_description_planning".
/**:
  ros__parameters:
    robot_description_planning:
      joint_limits:
        shoulder_pan:
          has_velocity_limits: true
          max_velocity: 1.0
          has_acceleration_limits: true
          max_acceleration: 2.0
        shoulder_lift:
          has_velocity_limits: true
          max_velocity: 1.0
          has_acceleration_limits: true
          max_acceleration: 2.0
        elbow_flex:
          has_velocity_limits: true
          max_velocity: 1.0
          has_acceleration_limits: true
          max_acceleration: 2.0
        wrist_flex:
          has_velocity_limits: true
          max_velocity: 1.0
          has_acceleration_limits: true
          max_acceleration: 2.0
        wrist_roll:
          has_velocity_limits: true
          max_velocity: 1.0
          has_acceleration_limits: true
          max_acceleration: 2.0
        gripper:
          has_velocity_limits: true
          max_velocity: 1.5
          has_acceleration_limits: true
          max_acceleration: 3.0
